<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
        }
        
        .login {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        
        .login-card h1 { margin-bottom: 20px; color: #333; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .chat {
            display: none;
            height: 100vh;
            flex-direction: column;
        }
        
        .header {
            background: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 10;
        }
        
        .header h2 { font-size: 16px; color: #333; }
        .header button {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .leave { background: #e74c3c !important; }
        
        #jitsi-container {
            flex: 1;
            background: #000;
        }
        
        @media (max-width: 600px) {
            .header h2 { font-size: 12px; }
            .header button { padding: 5px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="login" id="login">
        <div class="login-card">
            <h1>🎥 Video Chat</h1>
            <input type="text" id="nameInput" placeholder="Your name" autocomplete="off">
            <button onclick="startCall()">Start Call</button>
        </div>
    </div>
    
    <div class="chat" id="chat">
        <div class="header">
            <h2>Room: <span id="roomName">main-room</span></h2>
            <button onclick="copyLink()">📋 Copy Link</button>
            <button onclick="endCall()" class="leave">🚪 Leave</button>
        </div>
        <div id="jitsi-container"></div>
    </div>

    <script src="https://meet.jit.si/external_api.js"></script>
    <script>
        let jitsiApi;
        let roomId = 'main-room-' + Math.random().toString(36).substring(2, 8);
        
        function startCall() {
            const userName = document.getElementById('nameInput').value.trim();
            if (!userName) {
                alert('Enter your name');
                return;
            }
            
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            document.getElementById('roomName').textContent = roomId;
            
            const domain = 'meet.jit.si';
            const options = {
                roomName: roomId,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#jitsi-container'),
                userInfo: {
                    displayName: userName
                },
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    prejoinPageEnabled: false,
                    disableDeepLinking: true
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                        'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
                        'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
                        'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
                        'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone', 'security'
                    ]
                }
            };
            
            jitsiApi = new JitsiMeetExternalAPI(domain, options);
            
            jitsiApi.addEventListener('videoConferenceJoined', () => {
                console.log('Joined conference');
            });
        }
        
        function endCall() {
            if (jitsiApi) {
                jitsiApi.dispose();
            }
            document.getElementById('login').style.display = 'flex';
            document.getElementById('chat').style.display = 'none';
            document.getElementById('nameInput').value = '';
            // Создаем новую комнату для следующего звонка
            roomId = 'main-room-' + Math.random().toString(36).substring(2, 8);
        }
        
        function copyLink() {
            const link = window.location.origin + '?room=' + roomId;
            navigator.clipboard.writeText(link);
            alert('Link copied! Share it with friends.');
        }
        
        // Автоматический вход, если есть параметр room в URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomFromUrl = urlParams.get('room');
        if (roomFromUrl) {
            roomId = roomFromUrl;
            document.getElementById('nameInput').placeholder = 'Enter your name to join';
        }
    </script>
</body>
</html>
