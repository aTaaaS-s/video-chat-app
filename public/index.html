<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎥 Видеочат WebRTC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Экран входа -->
  <div class="screen" id="loginScreen">
    <div class="card">
      <h1>🎥 Видеочат</h1>
      <p>Создай комнату или присоединись к существующей</p>
      <input type="text" id="userName" placeholder="Ваше имя" maxlength="20"/>
      <input type="text" id="roomId" placeholder="Название комнаты" maxlength="20"/>
      <button onclick="joinRoom()">Войти</button>
    </div>
  </div>

  <!-- Экран видеочата -->
  <div class="screen" id="chatScreen" style="display: none;">
    <div class="header">
      <div class="room-info">
        <span>📍 Комната:</span>
        <strong id="displayRoomId"></strong>
        <button onclick="copyLink()" class="btn-small">📋</button>
      </div>
      <button onclick="leaveRoom()" class="btn-leave">🚪 Выйти</button>
    </div>
    
    <div class="videos-container" id="videosContainer">
      <!-- Видео будут добавляться сюда -->
    </div>

    <div class="controls">
      <button id="btnMic" onclick="toggleMic()">🎤</button>
      <button id="btnCam" onclick="toggleCam()">📷</button>
      <button onclick="leaveRoom()" class="btn-hangup">📞</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
