<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Видеочат</title>
  <style>
    body { margin: 0; font-family: Arial; background: #1a1a2e; }
    #meet { width: 100vw; height: 100vh; }
    .login {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; justify-content: center; align-items: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
    }
    .login input {
      padding: 15px; font-size: 18px; margin: 10px;
      border-radius: 10px; border: none; width: 300px;
    }
    .login button {
      padding: 15px 30px; font-size: 18px;
      background: #667eea; color: white; border: none;
      border-radius: 10px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login" id="login">
    <div>
      <input type="text" id="name" placeholder="Ваше имя">
      <br>
      <button onclick="join()">📹 Войти</button>
    </div>
  </div>
  <div id="meet" style="display:none"></div>
  
  <script src='https://meet.jit.si/external_api.js'></script>
  <script>
    function join() {
      const name = document.getElementById('name').value || 'User';
      const room = 'myvideochat' + Math.floor(Math.random() * 1000);
      
      const api = new JitsiMeetExternalAPI('meet.jit.si', {
        roomName: room,
        parentNode: document.getElementById('meet'),
        userInfo: { displayName: name },
        configOverwrite: {
          startWithAudioMuted: false,
          startWithVideoMuted: false
        },
        interfaceConfigOverwrite: {
          TOOLBAR_BUTTONS: ['microphone', 'camera', 'hangup']
        }
      });
      
      document.getElementById('login').style.display = 'none';
      document.getElementById('meet').style.display = 'block';
    }
  </script>
</body>
</html>
