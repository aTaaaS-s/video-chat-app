<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видеочат</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎥 Видеочат</h1>
    
    <div id="loginForm" class="form-group">
      <input type="text" id="userName" placeholder="Ваше имя">
      <div style="text-align:center; margin:15px 0; padding:15px; background:rgba(102,126,234,0.2); border-radius:10px;">
        <div style="font-size:20px; font-weight:bold; color:#667eea;">MAIN-ROOM</div>
        <div style="font-size:12px; color:#aaa;">Общая комната</div>
      </div>
      <button onclick="startVideo()" class="btn-primary">📹 Войти</button>
    </div>

    <div id="videoContainer" class="hidden">
      <div class="room-info">
        <h2>📍 MAIN-ROOM</h2>
        <p>Участников: <span id="userCount">1</span></p>
      </div>
      
      <div id="status">Подключено</div>
      <button onclick="copyLink()" class="btn-copy">📋 Скопировать ссылку</button>
      
      <div id="videosContainer"></div>
      
      <div class="controls">
        <button id="btnMic" onclick="toggleMic()" class="btn-control">🎤 ВКЛ</button>
        <button id="btnCam" onclick="toggleCam()" class="btn-control">📷 ВКЛ</button>
        <button onclick="stopVideo()" class="btn-control">❌ Выйти</button>
      </div>
      
      <div id="debug"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
