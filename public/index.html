<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Video Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-screen" id="loginScreen">
            <div class="login-card">
                <h1>🎥 Video Chat</h1>
                <input type="text" id="userName" placeholder="Your Name" required>
                <button onclick="join()">Join Chat</button>
            </div>
        </div>
        
        <div class="chat-screen" id="chatScreen" style="display: none;">
            <div class="header">
                <h2>Room: <span id="currentRoomId"></span></h2>
                <button onclick="copyLink()">📋 Copy Link</button>
                <button onclick="leave()" class="leave-btn">🚪 Leave</button>
            </div>
            
            <div class="participants-info">
                Participants: <span id="participantCount">0</span>
            </div>
            
            <div class="video-grid" id="videoGrid"></div>
            
            <div class="controls">
                <button onclick="toggleAudio()" id="audioBtn">🎤 Mute</button>
                <button onclick="toggleVideo()" id="videoBtn">📹 Stop</button>
                <button onclick="shareScreen()">🖥️ Share Screen</button>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
