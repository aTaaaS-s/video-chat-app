<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎥 Видеочат</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      color: white;
      min-height: 100vh;
      padding: 10px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; margin: 20px 0; font-size: 28px; }
    
    .form-group { 
      background: rgba(255,255,255,0.1); 
      padding: 30px; 
      border-radius: 15px; 
      max-width: 500px;
      margin: 0 auto 20px;
    }
    
    input { 
      padding: 14px; 
      margin: 10px 0; 
      width: 100%; 
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
    }
    
    input:focus { outline: none; border-color: #667eea; }
    
    button { 
      padding: 14px 24px; 
      margin: 8px; 
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
    }
    
    .btn-primary { 
      background: linear-gradient(135deg, #667eea, #764ba2); 
      color: white;
      width: 100%;
      margin-top: 15px;
    }
    
    .btn-control { 
      background: rgba(255,255,255,0.2); 
      color: white;
      flex: 1;
      min-width: 120px;
    }
    
    .btn-control.success { background: #48bb78; }
    .btn-control.active { background: #e53e3e; }
    
    .btn-copy {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      width: 100%;
      margin: 15px 0;
      padding: 16px;
    }
    
    #videoContainer { 
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }
    
    .room-info {
      background: rgba(102, 126, 234, 0.2);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    #videosContainer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    
    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .video-wrapper.mirror video {
      transform: scaleX(-1);
    }
    
    .user-name {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 14px;
    }
    
    .controls { 
      display: flex; 
      gap: 10px; 
      flex-wrap: wrap;
    }
    
    #status { 
      padding: 12px; 
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    #status.success { background: rgba(72, 187, 120, 0.3); }
    #status.warning { background: rgba(237, 137, 54, 0.3); }
    #status.error { background: rgba(229, 62, 62, 0.3); }
    
    #debug { 
      margin-top: 20px; 
      background: #000; 
      padding: 15px; 
      border-radius: 10px;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
    }
    
    #debug div { 
      padding: 3px 0; 
      border-bottom: 1px solid #333;
    }
    
    .hidden { display: none !important; }
    
    @media (max-width: 600px) {
      #videosContainer { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
      .btn-control { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 Видеочат</h1>
    
    <div id="loginForm" class="form-group">
      <input type="text" id="userName" placeholder="Ваше имя" maxlength="20">
      
      <div style="background: rgba(102, 126, 234, 0.2); padding: 20px; border-radius: 10px; margin: 20px 0; text-align: center;">
        <div style="font-size: 24px; font-weight: bold; color: #667eea; margin: 10px 0;">MAIN-ROOM</div>
        <div style="font-size: 13px; color: #888;">Общая комната для всех</div>
      </div>
      
      <button onclick="startVideo()" class="btn-primary">📹 Войти в видеочат</button>
    </div>

    <div id="videoContainer" class="hidden">
      <div class="room-info">
        <h2>📍 MAIN-ROOM</h2>
        <p>Участников: <span id="userCount">1</span></p>
      </div>
      
      <div id="status">Подключение...</div>
      
      <button onclick="copyLink()" class="btn-copy">📋 Скопировать ссылку для друга</button>
      
      <div id="videosContainer"></div>
      
      <div class="controls">
        <button id="btnMic" onclick="toggleMic()" class="btn-control success">🎤 Микрофон ВКЛ</button>
        <button id="btnCam" onclick="toggleCam()" class="btn-control success">📷 Камера ВКЛ</button>
        <button onclick="stopVideo()" class="btn-control">❌ Выйти</button>
      </div>
      
      <div id="debug"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let localStream = null;
    let peerConnections = {};
    let micEnabled = true;
    let camEnabled = true;
    const roomId = 'MAIN-ROOM';
    let userName = null;
    let mySocketId = null;

    // Улучшенная WebRTC конфигурация
    const rtcConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
        { urls: 'stun:stun4.l.google.com:19302' }
      ],
      iceCandidatePoolSize: 10
    };

    function log(msg) {
      const debug = document.getElementById('debug');
      const div = document.createElement('div');
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      debug.appendChild(div);
      debug.scrollTop = debug.scrollHeight;
      console.log(msg);
    }

    function setStatus(msg, type = '') {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = type;
    }

    function addVideo(stream, id, isLocal) {
      const container = document.getElementById('videosContainer');
      
      if (document.getElementById(`video-${id}`)) {
        log(`Видео ${id} уже добавлено`);
        return;
      }
      
      const wrapper = document.createElement('div');
      wrapper.className = `video-wrapper ${isLocal ? 'mirror' : ''}`;
      wrapper.id = `video-${id}`;

      const video = document.createElement('video');
      video.srcObject = stream;
      video.autoplay = true;
      video.playsInline = true;
      video.muted = isLocal;

      const nameTag = document.createElement('div');
      nameTag.className = 'user-name';
      nameTag.textContent = isLocal ? `${userName} (Вы)` : id;

      wrapper.appendChild(video);
      wrapper.appendChild(nameTag);
      container.appendChild(wrapper);
      
      log(`✅ Видео добавлено: ${isLocal ? 'ваше' : id}`);
    }

    async function startVideo() {
      userName = document.getElementById('userName').value.trim() || 'Аноним';
      
      log('🚀 Запуск видеочата...');
      setStatus('Запрос доступа...', 'warning');

      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });

        log('✅ Доступ получен!');
        log(`Аудио треков: ${localStream.getAudioTracks().length}`);
        log(`Видео треков: ${localStream.getVideoTracks().length}`);

        addVideo(localStream, userName, true);
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('videoContainer').classList.remove('hidden');
        setStatus('✅ Подключено', 'success');

        socket.emit('join-room', { roomId, userName });
        setTimeout(testMicrophone, 2000);

      } catch (err) {
        log(`❌ Ошибка: ${err.message}`);
        setStatus(`Ошибка: ${err.message}`, 'error');
        alert(err.message);
      }
    }

    function createPeerConnection(targetId) {
      if (peerConnections[targetId]) {
        log(`PeerConnection с ${targetId} уже существует`);
        return peerConnections[targetId];
      }
      
      log(`🔧 Создание PeerConnection для ${targetId}`);
      const pc = new RTCPeerConnection(rtcConfig);

      // Добавляем треки
      localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
        log(`Добавлен трек: ${track.kind}`);
      });

      // Когда получаем удалённый трек
      pc.ontrack = (event) => {
        log(`📹 Получен ${event.track.kind} трек от ${targetId}`);
        const stream = event.streams[0];
        addVideo(stream, targetId, false);
      };

      // ICE кандидаты
      pc.onicecandidate = (event) => {
        if (event.candidate) {
          log(`❄️ ICE кандидат для ${targetId}`);
          socket.emit('ice-candidate', {
            targetId,
            candidate: event.candidate
          });
        }
      };

      pc.oniceconnectionstatechange = () => {
        log(`🔌 ICE состояние с ${targetId}: ${pc.iceConnectionState}`);
        
        if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
          setStatus('✅ Соединение установлено!', 'success');
        } else if (pc.iceConnectionState === 'failed') {
          log(`❌ Соединение с ${targetId} не удалось`);
        }
      };

      pc.onconnectionstatechange = () => {
        log(`📡 Connection state: ${pc.connectionState}`);
      };

      pc.onnegotiationneeded = async () => {
        log(`🔄 Negotiation needed с ${targetId}`);
      };

      peerConnections[targetId] = pc;
      log(`✅ PeerConnection создан для ${targetId}`);
      return pc;
    }

    // ===== СОБЫТИЯ =====
    socket.on('connect', () => {
      mySocketId = socket.id;
      log(`🔌 Подключён к серверу. ID: ${mySocketId}`);
    });

    socket.on('user-joined', async ({ id, name }) => {
      log(`👤 ${name} (${id}) присоединился`);
      
      const pc = createPeerConnection(id);

      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        log(`📤 Отправляю offer ${id}`);

        // Ждём немного перед отправкой
        setTimeout(() => {
          socket.emit('offer', { 
            targetId: id, 
            offer: pc.localDescription 
          });
        }, 500);

      } catch (err) {
        log(`❌ Ошибка создания offer: ${err.message}`);
      }
    });

    socket.on('offer', async ({ senderId, offer }) => {
      log(`📥 Получен offer от ${senderId}`);
      
      const pc = createPeerConnection(senderId);

      try {
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        log(`✅ Remote description установлен (offer)`);
        
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        log(`📤 Отправляю answer ${senderId}`);

        setTimeout(() => {
          socket.emit('answer', { 
            targetId: senderId, 
            answer: pc.localDescription 
          });
        }, 500);

      } catch (err) {
        log(`❌ Ошибка обработки offer: ${err.message}`);
      }
    });

    socket.on('answer', async ({ senderId, answer }) => {
      log(`📥 Получен answer от ${senderId}`);
      
      const pc = peerConnections[senderId];
      if (pc) {
        try {
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
          log(`✅ Remote description установлен (answer)`);
        } catch (err) {
          log(`❌ Ошибка установки answer: ${err.message}`);
        }
      }
    });

    socket.on('ice-candidate', async ({ senderId, candidate }) => {
      log(`❄️ Получен ICE кандидат от ${senderId}`);
      
      const pc = peerConnections[senderId];
      if (pc && candidate) {
        try {
          await pc.addIceCandidate(new RTCIceCandidate(candidate));
          log(`✅ ICE кандидат добавлен`);
        } catch (err) {
          log(`❌ Ошибка добавления ICE: ${err.message}`);
        }
      }
    });

    socket.on('user-left', ({ id }) => {
      log(`👤 ${id} вышел`);
      if (peerConnections[id]) {
        peerConnections[id].close();
        delete peerConnections[id];
      }
      const videoEl = document.getElementById(`video-${id}`);
      if (videoEl) videoEl.remove();
    });

    socket.on('room-users', (users) => {
      log(`👥 В комнате ${users.length} других пользователей`);
      document.getElementById('userCount').textContent = users.length + 1;
      
      users.forEach(({ id, name }) => {
        log(`Создаю соединение с ${name} (${id})`);
        createPeerConnection(id);
      });
    });

    // ===== УПРАВЛЕНИЕ =====
    function toggleMic() {
      const track = localStream?.getAudioTracks()[0];
      const btn = document.getElementById('btnMic');
      
      if (track) {
        micEnabled = !micEnabled;
        track.enabled = micEnabled;
        btn.textContent = micEnabled ? '🎤 Микрофон ВКЛ' : '🔇 Микрофон ВЫКЛ';
        btn.className = `btn-control ${micEnabled ? 'success' : 'active'}`;
        log(micEnabled ? '🎤 Микрофон включён' : '🔇 Микрофон выключен');
      }
    }

    function toggleCam() {
      const track = localStream?.getVideoTracks()[0];
      const btn = document.getElementById('btnCam');
      
      if (track) {
        camEnabled = !camEnabled;
        track.enabled = camEnabled;
        btn.textContent = camEnabled ? '📷 Камера ВКЛ' : '📵 Камера ВЫКЛ';
        btn.className = `btn-control ${camEnabled ? 'success' : 'active'}`;
        log(camEnabled ? '📷 Камера включена' : '📵 Камера выключена');
      }
    }

    function testMicrophone() {
      const audioTrack = localStream?.getAudioTracks()[0];
      if (!audioTrack || !audioTrack.enabled) return;

      const audioContext = new AudioContext();
      const analyser = audioContext.createAnalyser();
      const source = audioContext.createMediaStreamSource(localStream);
      source.connect(analyser);
      analyser.fftSize = 256;
      
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      function check() {
        if (!micEnabled) return;
        analyser.getByteFrequencyData(dataArray);
        const average = dataArray.reduce((a,b) => a+b) / dataArray.length;
        if (average > 5) {
          log('✅ Микрофон работает!');
        }
        setTimeout(check, 2000);
      }
      check();
    }

    function copyLink() {
      const url = window.location.origin;
      navigator.clipboard.writeText(url).then(() => {
        alert('✅ Ссылка скопирована!\n\n' + url);
      });
    }

    function stopVideo() {
      Object.values(peerConnections).forEach(pc => pc.close());
      peerConnections = {};
      
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }
      
      location.reload();
    }
  </script>
</body>
</html>
