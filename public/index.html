<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видеочат</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      color: white; 
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; font-size: 32px; }
    
    #login { 
      max-width: 400px; 
      margin: 100px auto; 
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    #login input { 
      padding: 15px; 
      width: 100%; 
      margin-bottom: 20px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 18px;
    }
    #login input:focus { 
      outline: none; 
      border-color: #667eea; 
    }
    #login button { 
      padding: 15px 30px; 
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s;
    }
    #login button:hover { transform: translateY(-2px); }
    
    #chat { display: none; }
    
    .info { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 20px;
      padding: 15px 20px;
      background: rgba(102, 126, 234, 0.2);
      border-radius: 10px;
    }
    .info button {
      padding: 8px 15px;
      background: #667eea;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    
    #videos { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
      gap: 20px; 
      margin-bottom: 20px;
    }
    .video-wrap { 
      position: relative; 
      background: #000; 
      border-radius: 15px; 
      overflow: hidden;
      aspect-ratio: 4/3;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .video-wrap video { 
      width: 100%; 
      height: 100%; 
      object-fit: cover;
    }
    .video-wrap.mirror video { transform: scaleX(-1); }
    .user-label { 
      position: absolute; 
      bottom: 15px; 
      left: 15px; 
      background: rgba(0,0,0,0.8); 
      padding: 8px 15px; 
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
    }
    
    .controls { 
      display: flex; 
      gap: 15px; 
      margin-bottom: 20px;
    }
    .controls button { 
      flex: 1; 
      padding: 15px; 
      border: none; 
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      color: white;
      transition: all 0.2s;
    }
    .controls button:hover { transform: translateY(-2px); }
    .controls button.active { background: #e53e3e; }
    .controls button.success { background: #48bb78; }
    
    #log { 
      background: rgba(0,0,0,0.5); 
      padding: 15px; 
      border-radius: 10px; 
      max-height: 250px; 
      overflow-y: auto;
      font-size: 13px;
      font-family: 'Courier New', monospace;
    }
    #log div { 
      padding: 4px 0; 
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    @media (max-width: 600px) {
      #videos { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 Видеочат</h1>
    
    <div id="login">
      <input type="text" id="nameInput" placeholder="Введите ваше имя">
      <button onclick="joinChat()">📹 Войти в видеочат</button>
    </div>

    <div id="chat">
      <div class="info">
        <div style="font-size: 18px;">👥 Участников: <strong id="count">1</strong></div>
        <button onclick="copyLink()">📋 Скопировать ссылку</button>
      </div>
      
      <div id="videos"></div>
      
      <div class="controls">
        <button id="btnMic" onclick="toggleMic()" class="success">🎤 Микрофон ВКЛ</button>
        <button id="btnCam" onclick="toggleCam()" class="success">📷 Камера ВКЛ</button>
        <button onclick="location.reload()">❌ Выйти</button>
      </div>
      
      <div id="log"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let localStream = null;
    let peerConnections = {};
    let userName = null;

    const rtcConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
      ]
    };

    function log(msg) {
      const div = document.createElement('div');
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      document.getElementById('log').appendChild(div);
      document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
      console.log(msg);
    }

    async function joinChat() {
      userName = document.getElementById('nameInput').value.trim() || 'User' + Math.floor(Math.random() * 1000);
      
      log('🚀 Подключение...');
      
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480 },
          audio: { echoCancellation: true, noiseSuppression: true }
        });
        
        log('✅ Доступ к камере и микрофону получен');
        log(`🎤 Аудио треков: ${localStream.getAudioTracks().length}`);
        log(`📹 Видео треков: ${localStream.getVideoTracks().length}`);
        
        addVideo(localStream, userName, true);
        
        document.getElementById('login').style.display = 'none';
        document.getElementById('chat').style.display = 'block';
        
        // Отправляем join с именем
        socket.emit('join', userName);
        log('📤 Отправлено join');
        
        setTimeout(startAudioMonitoring, 2000);
        
      } catch (err) {
        alert('Ошибка доступа: ' + err.message);
        log('❌ Ошибка: ' + err.message);
      }
    }

    function addVideo(stream, id, isLocal) {
      if (document.getElementById('video-' + id)) {
        log('⚠️ Видео уже существует: ' + id);
        return;
      }
      
      log('🎬 Добавляю видео: ' + (isLocal ? 'ваше' : id));
      
      const wrap = document.createElement('div');
      wrap.className = 'video-wrap' + (isLocal ? ' mirror' : '');
      wrap.id = 'video-' + id;
      
      const video = document.createElement('video');
      video.srcObject = stream;
      video.autoplay = true;
      video.playsInline = true;
      video.muted = isLocal;
      
      const label = document.createElement('div');
      label.className = 'user-label';
      label.textContent = isLocal ? userName + ' (Вы)' : id;
      
      wrap.appendChild(video);
      wrap.appendChild(label);
      document.getElementById('videos').appendChild(wrap);
      
      // Проверяем треки
      setTimeout(() => {
        const tracks = stream.getTracks();
        log(`📹 ${id}: ${tracks.length} треков`);
        tracks.forEach(t => log(`  - ${t.kind}: ${t.enabled ? 'вкл' : 'выкл'}`));
      }, 1500);
    }

    function startAudioMonitoring() {
      const audioTrack = localStream.getAudioTracks()[0];
      if (!audioTrack) {
        log('❌ Аудио трек не найден');
        return;
      }
      
      log('🎤 Запуск мониторинга микрофона...');
      
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      
      const source = audioContext.createMediaStreamSource(localStream);
      source.connect(analyser);
      
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      let checks = 0;
      function check() {
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a,b) => a+b) / dataArray.length;
        const peak = Math.max(...dataArray);
        
        checks++;
        if (checks <= 5) {
          log(`🎤 Уровень #${checks}: ${Math.round(avg)} (пик: ${peak})`);
          if (avg > 10) {
            log('✅ МИКРОФОН РАБОТАЕТ!');
          }
        }
        
        setTimeout(check, 2000);
      }
      check();
    }

    function createPC(targetId) {
      if (peerConnections[targetId]) {
        log('⚠️ PC уже существует для ' + targetId);
        return peerConnections[targetId];
      }
      
      log('🔧 Создаю PeerConnection для ' + targetId);
      
      const pc = new RTCPeerConnection(rtcConfig);
      
      localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
        log(`  Добавлен трек: ${track.kind}`);
      });
      
      pc.ontrack = (e) => {
        log(`📥 Получен ${e.track.kind} трек от ${targetId}`);
        addVideo(e.streams[0], targetId, false);
      };
      
      pc.onicecandidate = (e) => {
        if (e.candidate) {
          log(`❄️ ICE кандидат для ${targetId}`);
          socket.emit('ice', { to: targetId, ice: e.candidate });
        }
      };
      
      pc.oniceconnectionstatechange = () => {
        log(`🔌 ICE состояние с ${targetId}: ${pc.iceConnectionState}`);
      };
      
      pc.onconnectionstatechange = () => {
        log(`📡 Connection state: ${pc.connectionState}`);
      };
      
      peerConnections[targetId] = pc;
      log('✅ PeerConnection создан');
      return pc;
    }

    // ===== SOCKET.IO СОБЫТИЯ =====

    socket.on('usersList', (users) => {
      log(`👥 В чате ${users.length} других пользователей`);
      users.forEach(u => {
        log(`  - ${u.name} (${u.id})`);
        createPC(u.id);
      });
    });

    socket.on('userJoined', ({id, name}) => {
      log(`👤 ${name} (${id}) присоединился к чату`);
      
      if (id === socket.id) {
        log('Это мы сами, пропускаем создание PC');
        return;
      }
      
      const pc = createPC(id);
      
      setTimeout(async () => {
        try {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          log('📤 Offer создан и установлен');
          
          setTimeout(() => {
            socket.emit('offer', { to: id, offer: pc.localDescription });
            log('📤 Offer отправлен');
          }, 1000);
          
        } catch(e) {
          log('❌ Ошибка создания offer: ' + e.message);
        }
      }, 500);
    });

    socket.on('offer', async ({from, offer}) => {
      log(`📥 Получен offer от ${from}`);
      
      const pc = createPC(from);
      
      try {
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        log('✅ Remote description (offer) установлен');
        
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        log('📤 Answer создан и установлен');
        
        setTimeout(() => {
          socket.emit('answer', { to: from, answer: pc.localDescription });
          log('📤 Answer отправлен');
        }, 1000);
        
      } catch(e) {
        log('❌ Ошибка обработки offer: ' + e.message);
      }
    });

    socket.on('answer', async ({from, answer}) => {
      log(`📥 Получен answer от ${from}`);
      
      const pc = peerConnections[from];
      if (pc) {
        try {
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
          log('✅ Remote description (answer) установлен');
        } catch(e) {
          log('❌ Ошибка установки answer: ' + e.message);
        }
      }
    });

    socket.on('ice', async ({from, ice}) => {
      if (!ice) return;
      
      const pc = peerConnections[from];
      if (pc) {
        try {
          await pc.addIceCandidate(new RTCIceCandidate(ice));
          log(`✅ ICE кандидат добавлен от ${from}`);
        } catch(e) {
          log(`⚠️ Ошибка добавления ICE: ${e.message}`);
        }
      }
    });

    socket.on('userLeft', ({id}) => {
      log(`👤 Пользователь ${id} вышел`);
      
      if (peerConnections[id]) {
        peerConnections[id].close();
        delete peerConnections[id];
        log('️ PeerConnection закрыт');
      }
      
      const videoEl = document.getElementById('video-' + id);
      if (videoEl) {
        videoEl.remove();
        log('🗑️ Видео удалено');
      }
    });

    socket.on('count', (n) => {
      document.getElementById('count').textContent = n;
      log(`👥 Всего участников: ${n}`);
    });

    // ===== УПРАВЛЕНИЕ =====

    function toggleMic() {
      const track = localStream?.getAudioTracks()[0];
      if (track) {
        track.enabled = !track.enabled;
        const btn = document.getElementById('btnMic');
        btn.textContent = track.enabled ? '🎤 Микрофон ВКЛ' : '🔇 Микрофон ВЫКЛ';
        btn.className = track.enabled ? 'success' : 'active';
        log(track.enabled ? '🎤 Микрофон включён' : '🔇 Микрофон выключен');
      }
    }

    function toggleCam() {
      const track = localStream?.getVideoTracks()[0];
      if (track) {
        track.enabled = !track.enabled;
        const btn = document.getElementById('btnCam');
        btn.textContent = track.enabled ? '📷 Камера ВКЛ' : '📵 Камера ВЫКЛ';
        btn.className = track.enabled ? 'success' : 'active';
        log(track.enabled ? '📷 Камера включена' : '📵 Камера выключена');
      }
    }

    function copyLink() {
      const url = window.location.origin;
      navigator.clipboard.writeText(url).then(() => {
        alert('✅ Ссылка скопирована!\n\n' + url + '\n\nОтправьте другу!');
      });
    }
  </script>
</body>
</html>
