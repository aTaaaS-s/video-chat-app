<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Video Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; }
        
        .login {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        
        .login-card h1 { margin-bottom: 20px; color: #333; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .chat {
            display: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .header h2 { font-size: 16px; color: #333; }
        .header button {
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .leave { background: #e74c3c !important; }
        
        .info {
            background: #f0f2f5;
            padding: 8px 15px;
            font-size: 14px;
            color: #666;
        }
        
        .video-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 15px;
            background: #f0f2f5;
            overflow-y: auto;
        }
        
        .video-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }
        
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-container .name {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .controls {
            background: white;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid #ddd;
        }
        
        .controls button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .video-grid { grid-template-columns: 1fr; }
            .controls button { padding: 8px 15px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="login" id="login">
        <div class="login-card">
            <h1>🎥 Video Chat</h1>
            <input type="text" id="nameInput" placeholder="Your name" autocomplete="off">
            <button onclick="join()">Join Chat</button>
        </div>
    </div>
    
    <div class="chat" id="chat">
        <div class="header">
            <h2>Room: Main Room</h2>
            <button onclick="copyLink()">📋 Copy Link</button>
            <button onclick="leave()" class="leave">🚪 Leave</button>
        </div>
        <div class="info">👥 Participants: <span id="count">1</span></div>
        <div class="video-grid" id="videoGrid"></div>
        <div class="controls">
            <button onclick="toggleMic()" id="micBtn">🎤 Mute</button>
            <button onclick="toggleCam()" id="camBtn">📹 Stop</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let localStream;
        let peers = {};
        let myId;
        let myName;
        
        const loginDiv = document.getElementById('login');
        const chatDiv = document.getElementById('chat');
        const videoGrid = document.getElementById('videoGrid');
        const countSpan = document.getElementById('count');
        
        async function join() {
            myName = document.getElementById('nameInput').value.trim();
            if (!myName) {
                alert('Enter your name');
                return;
            }
            
            loginDiv.style.display = 'none';
            chatDiv.style.display = 'flex';
            
            // Получаем доступ к камере и микрофону
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                addLocalVideo();
            } catch(e) {
                alert('Need camera and microphone access');
                return;
            }
            
            // Подключаемся к серверу
            socket = io();
            
            socket.on('connect', () => {
                myId = socket.id;
                socket.emit('join', myName);
            });
            
            socket.on('room-data', (data) => {
                console.log('Room data:', data);
                // Добавляем существующих участников
                data.participants.forEach(p => {
                    if (p.id !== myId) {
                        addRemote(p.id, p.name);
                    }
                });
                updateCount();
            });
            
            socket.on('user-joined', (data) => {
                console.log('User joined:', data.userName);
                addRemote(data.userId, data.userName);
            });
            
            socket.on('user-left', (data) => {
                console.log('User left:', data.userName);
                removeRemote(data.userId);
            });
            
            socket.on('signal', async (data) => {
                console.log('Signal from:', data.fromName);
                if (!peers[data.from]) {
                    peers[data.from] = createPeer(data.from);
                }
                await peers[data.from].signal(data.signal);
            });
        }
        
        function createPeer(targetId) {
            const peer = new SimplePeer({
                initiator: true,
                trickle: true,
                stream: localStream
            });
            
            peer.on('signal', (signal) => {
                socket.emit('signal', { target: targetId, signal });
            });
            
            peer.on('stream', (remoteStream) => {
                console.log('Got remote stream from:', targetId);
                const container = document.getElementById(`video-${targetId}`);
                if (container) {
                    const video = container.querySelector('video');
                    if (video) {
                        video.srcObject = remoteStream;
                        video.play();
                    }
                }
            });
            
            peer.on('error', (err) => {
                console.error('Peer error:', err);
            });
            
            return peer;
        }
        
        function addRemote(userId, userName) {
            if (userId === myId) return;
            if (document.getElementById(`video-${userId}`)) return;
            
            console.log('Adding remote:', userName);
            
            const container = document.createElement('div');
            container.className = 'video-container';
            container.id = `video-${userId}`;
            
            const video = document.createElement('video');
            video.autoplay = true;
            video.playsInline = true;
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'name';
            nameDiv.textContent = userName;
            
            container.appendChild(video);
            container.appendChild(nameDiv);
            videoGrid.appendChild(container);
            
            // Создаем peer (не инициатор)
            const peer = new SimplePeer({
                initiator: false,
                trickle: true,
                stream: localStream
            });
            
            peer.on('signal', (signal) => {
                socket.emit('signal', { target: userId, signal });
            });
            
            peer.on('stream', (remoteStream) => {
                console.log('Got remote stream from:', userName);
                video.srcObject = remoteStream;
            });
            
            peer.on('error', (err) => {
                console.error('Peer error:', err);
            });
            
            peers[userId] = peer;
            updateCount();
        }
        
        function removeRemote(userId) {
            const container = document.getElementById(`video-${userId}`);
            if (container) container.remove();
            
            if (peers[userId]) {
                peers[userId].destroy();
                delete peers[userId];
            }
            
            updateCount();
        }
        
        function addLocalVideo() {
            const container = document.createElement('div');
            container.className = 'video-container';
            container.id = `video-${myId}`;
            
            const video = document.createElement('video');
            video.srcObject = localStream;
            video.autoplay = true;
            video.muted = true;
            video.playsInline = true;
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'name';
            nameDiv.textContent = `${myName} (You)`;
            
            container.appendChild(video);
            container.appendChild(nameDiv);
            videoGrid.appendChild(container);
        }
        
        function updateCount() {
            const count = document.querySelectorAll('.video-container').length;
            countSpan.textContent = count;
        }
        
        function toggleMic() {
            const track = localStream?.getAudioTracks()[0];
            if (track) {
                track.enabled = !track.enabled;
                document.getElementById('micBtn').textContent = track.enabled ? '🎤 Mute' : '🔇 Unmute';
            }
        }
        
        function toggleCam() {
            const track = localStream?.getVideoTracks()[0];
            if (track) {
                track.enabled = !track.enabled;
                document.getElementById('camBtn').textContent = track.enabled ? '📹 Stop' : '📹 Start';
            }
        }
        
        function leave() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            Object.values(peers).forEach(p => p.destroy());
            peers = {};
            videoGrid.innerHTML = '';
            loginDiv.style.display = 'flex';
            chatDiv.style.display = 'none';
            document.getElementById('nameInput').value = '';
            if (socket) socket.disconnect();
        }
        
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert('Link copied!');
        }
    </script>
    
    <!-- SimplePeer библиотека -->
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
</body>
</html>
