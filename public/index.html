<!-- Добавь после controls -->
<div class="status-bar" style="background: rgba(0,0,0,0.6); padding: 10px; text-align: center; font-size: 12px;">
  <span id="micStatus">🎤 Проверка...</span> | 
  <span id="camStatus">📹 Проверка...</span> |
  <button onclick="testAudio()" style="margin-left: 10px; padding: 3px 8px; cursor: pointer;">🔊 Тест звука</button>
</div>

<script>
function testAudio() {
  const audioTrack = localStream?.getAudioTracks()[0];
  if (audioTrack) {
    const settings = audioTrack.getSettings();
    alert(`Микрофон:\n• Название: ${audioTrack.label}\n• Включен: ${audioTrack.enabled}\n• Устройство: ${settings.deviceId || 'default'}`);
  } else {
    alert('Микрофон не найден!');
  }
}
</script>
