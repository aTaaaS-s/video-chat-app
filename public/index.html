<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎥 Видеочат</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      margin: 0; 
      padding: 10px; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      color: white;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { margin-bottom: 20px; font-size: 28px; text-align: center; }
    
    .form-group { 
      background: rgba(255,255,255,0.1); 
      padding: 30px; 
      border-radius: 15px; 
      margin-bottom: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    
    input { 
      padding: 14px; 
      margin: 10px 0; 
      width: 100%; 
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
    }
    
    input::placeholder { color: #aaa; }
    input:focus { outline: none; border-color: #667eea; }
    
    button { 
      padding: 14px 24px; 
      margin: 8px; 
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    button:active { transform: scale(0.95); }
    
    .btn-primary { 
      background: linear-gradient(135deg, #667eea, #764ba2); 
      color: white;
      width: 100%;
      margin-top: 15px;
    }
    
    .btn-primary:hover { transform: translateY(-2px); }
    
    .btn-control { 
      background: rgba(255,255,255,0.2); 
      color: white;
      flex: 1;
      min-width: 120px;
    }
    
    .btn-control.active { background: #e53e3e; }
    .btn-control.success { background: #48bb78; }
    
    .btn-copy {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      width: 100%;
      margin: 15px 0;
    }
    
    #videoContainer { 
      margin-top: 20px; 
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
    }
    
    .room-info {
      background: rgba(102, 126, 234, 0.2);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .room-info h2 {
      font-size: 24px;
      color: #667eea;
      margin-bottom: 5px;
    }
    
    .room-info p {
      color: #aaa;
      font-size: 14px;
    }
    
    #videosContainer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    
    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .video-wrapper.mirror video {
      transform: scaleX(-1);
    }
    
    .user-name {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 14px;
    }
    
    video { 
      width: 100%; 
      border-radius: 10px;
      background: #000;
      display: block;
    }
    
    .controls { 
      display: flex; 
      gap: 10px; 
      margin-top: 15px;
      flex-wrap: wrap;
    }
    
    #status { 
      padding: 12px; 
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: 500;
    }
    
    #status.error { background: rgba(229, 62, 62, 0.3); }
    #status.success { background: rgba(72, 187, 120, 0.3); }
    #status.warning { background: rgba(237, 137, 54, 0.3); }
    
    #debug { 
      margin-top: 20px; 
      background: #000; 
      padding: 15px; 
      border-radius: 10px;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
    }
    
    #debug div { 
      padding: 4px 0; 
      border-bottom: 1px solid #333;
    }
    
    .device-info {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      font-size: 14px;
    }
    
    .participants {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
    }
    
    .participants h3 {
      margin-bottom: 8px;
      font-size: 16px;
    }
    
    .participant {
      padding: 5px 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 5px;
      margin: 5px 0;
      font-size: 14px;
    }
    
    .hidden { display: none !important; }
    
    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      .form-group { padding: 20px; }
      #videosContainer { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
      .btn-control { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 Видеочат</h1>
    
    <!-- Экран входа -->
    <div id="loginForm" class="form-group">
      <input type="text" id="userName" placeholder="Ваше имя" maxlength="20">
      
      <div class="device-info" id="deviceInfo">
        🔍 Поиск устройств...
      </div>
      
      <div style="background: rgba(102, 126, 234, 0.2); padding: 20px; border-radius: 10px; margin: 20px 0; text-align: center;">
        <div style="font-size: 14px; color: #aaa; margin-bottom: 8px;">📍 Общая комната</div>
        <div style="font-size: 24px; font-weight: bold; color: #667eea;">MAIN-ROOM</div>
        <div style="font-size: 13px; color: #888; margin-top: 8px;">Все пользователи подключаются сюда</div>
      </div>
      
      <button onclick="startVideo()" class="btn-primary">📹 Войти в видеочат</button>
      
      <div style="margin-top: 20px; font-size: 13px; color: #888; text-align: center;">
        💡 Разрешите доступ к камере и микрофону<br>
        Отправьте ссылку другу чтобы подключиться
      </div>
    </div>

    <!-- Экран видеочата -->
    <div id="videoContainer" class="hidden">
      <div class="room-info">
        <h2>📍 MAIN-ROOM</h2>
        <p>Общая комната для всех</p>
      </div>
      
      <div id="status">Подключение...</div>
      
      <div class="participants" id="participantsList">
        <h3>👥 Участники: <span id="userCount">0</span></h3>
        <div id="usersList"></div>
      </div>
      
      <button onclick="copyLink()" class="btn-copy">📋 Скопировать ссылку для друга</button>
      
      <div id="videosContainer"></div>
      
      <div class="controls">
        <button id="btnMic" onclick="toggleMic()" class="btn-control success">
          🎤 Микрофон ВКЛ
        </button>
        <button id="btnCam" onclick="toggleCam()" class="btn-control success">
          📷 Камера ВКЛ
        </button>
        <button onclick="stopVideo()" class="btn-control">
          ❌ Выйти
        </button>
      </div>
      
      <div id="debug"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script
