<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видеочат</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎥 Видеочат</h1>
    
    <div id="login">
      <input type="text" id="nameInput" placeholder="Ваше имя">
      <button onclick="join()">📹 Войти</button>
    </div>

    <div id="chat" style="display:none">
      <div class="info">
        <div>👥 Участников: <span id="count">1</span></div>
        <button onclick="copyLink()" class="btn-copy">📋 Ссылка</button>
      </div>
      
      <div id="videos"></div>
      
      <div class="controls">
        <button id="btnMic" onclick="toggleMic()">🎤 ВКЛ</button>
        <button id="btnCam" onclick="toggleCam()">📷 ВКЛ</button>
        <button onclick="location.reload()">❌ Выход</button>
      </div>
      
      <div id="log"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
