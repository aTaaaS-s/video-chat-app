<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎥 Видеочат</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎥 Видеочат</h1>
    
    <div id="loginForm" class="form-group">
      <input type="text" id="userName" placeholder="Ваше имя" maxlength="20">
      
      <div style="background: rgba(102, 126, 234, 0.2); padding: 20px; border-radius: 10px; margin: 20px 0; text-align: center;">
        <div style="font-size: 24px; font-weight: bold; color: #667eea; margin: 10px 0;">MAIN-ROOM</div>
        <div style="font-size: 13px; color: #888;">Общая комната для всех</div>
      </div>
      
      <button onclick="startVideo()" class="btn-primary">📹 Войти в видеочат</button>
    </div>

    <div id="videoContainer" class="hidden">
      <div class="room-info">
        <h2>📍 MAIN-ROOM</h2>
        <p>Участников: <span id="userCount">1</span></p>
      </div>
      
      <div id="status">Подключение...</div>
      
      <button onclick="copyLink()" class="btn-copy">📋 Скопировать ссылку для друга</button>
      
      <div id="videosContainer"></div>
      
      <div class="controls">
        <button id="btnMic" onclick="toggleMic()" class="btn-control success">🎤 Микрофон ВКЛ</button>
        <button id="btnCam" onclick="toggleCam()" class="btn-control success">📷 Камера ВКЛ</button>
        <button onclick="stopVideo()" class="btn-control">❌ Выйти</button>
      </div>
      
      <div id="debug"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
