<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видеочат</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      color: white; 
      padding: 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; }
    
    #login { 
      max-width: 400px; 
      margin: 100px auto; 
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
    }
    #login input { 
      padding: 15px; 
      width: 100%; 
      margin-bottom: 20px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 18px;
    }
    #login button { 
      padding: 15px 30px; 
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    
    #call-container { 
      width: 100%; 
      height: 70vh;
      border-radius: 15px;
      overflow: hidden;
      background: #000;
    }
    
    .controls { 
      display: flex; 
      gap: 15px; 
      margin-top: 20px;
      justify-content: center;
    }
    .controls button { 
      padding: 15px 30px; 
      border: none; 
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      color: white;
    }
    .controls button:hover { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 Видеочат</h1>
    
    <div id="login">
      <input type="text" id="nameInput" placeholder="Ваше имя">
      <button onclick="joinCall()">📹 Войти</button>
      <div style="margin-top: 20px; font-size: 14px; color: #aaa;">
        Комната: <strong>my-video-chat-room</strong>
      </div>
    </div>

    <div id="call-container" style="display: none;"></div>
    
    <div class="controls" id="controls" style="display: none;">
      <button onclick="toggleMic()">🎤 Микрофон</button>
      <button onclick="toggleCam()">📷 Камера</button>
      <button onclick="leaveCall()" style="background: #e53e3e;">❌ Выйти</button>
    </div>
  </div>

  <script src="https://unpkg.com/@daily-co/daily-js"></script>
  <script>
    let callFrame = null;
    let userName = null;

    async function joinCall() {
      userName = document.getElementById('nameInput').value.trim() || 'User';
      
      // Создаём комнату на Daily.co
      const roomUrl = 'https://video-chat-test.daily.co/my-room-' + userName.substring(0, 4);
      
      callFrame = window.DailyIframe.createFrame(
        document.getElementById('call-container'),
        {
          iframeStyle: {
            width: '100%',
            height: '100%',
            border: '0'
          },
          showLeaveButton: false,
          userName: userName
        }
      );
      
      try {
        await callFrame.join({ url: roomUrl });
        
        document.getElementById('login').style.display = 'none';
        document.getElementById('call-container').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';
        
        console.log('✅ Подключён к:', roomUrl);
        
      } catch (err) {
        alert('Ошибка: ' + err.message);
      }
    }

    function toggleMic() {
      if (callFrame) {
        callFrame.setLocalAudio(!callFrame.localAudio());
      }
    }

    function toggleCam() {
      if (callFrame) {
        callFrame.setLocalVideo(!callFrame.localVideo());
      }
    }

    function leaveCall() {
      if (callFrame) {
        callFrame.leave();
        location.reload();
      }
    }
  </script>
</body>
</html>
